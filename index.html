<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; line-height:1.55; }
  #gate { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0e1116; color:#e6edf3; }
  #gate .box { width:min(92vw,360px); text-align:center; }
  #gate h1 { font-size:1.05rem; font-weight:600; opacity:.8; margin:0 0 1rem; }
  #gate input { width:100%; padding:.7rem .8rem; font-size:1rem; border-radius:8px; border:1px solid #30363d; background:#161b22; color:#e6edf3; }
  #gate button { margin-top:.7rem; width:100%; padding:.7rem; font-size:1rem; border:0; border-radius:8px; background:#2563eb; color:#fff; cursor:pointer; }
  #gate .err { color:#f85149; font-size:.85rem; min-height:1.1em; margin-top:.6rem; }
  #app { display:none; }
  .topbar { position:sticky; top:0; z-index:5; display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; padding:.6rem 1rem; border-bottom:1px solid #d0d7de; background:Canvas; }
  .topbar button { padding:.4rem .8rem; border:1px solid #d0d7de; border-radius:6px; background:Canvas; color:CanvasText; cursor:pointer; font-size:.9rem; }
  .topbar button.active { background:#2563eb; color:#fff; border-color:#2563eb; }
  .topbar .spacer { flex:1; }
  main { max-width:920px; margin:0 auto; padding:1.5rem 1.2rem 4rem; }
  main pre { background:#f6f8fa; padding:1rem; border-radius:8px; overflow:auto; }
  main code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.9em; }
  main table { border-collapse:collapse; }
  main th, main td { border:1px solid #d0d7de; padding:.4rem .6rem; }
  @media (prefers-color-scheme: dark){
    body { background:#0d1117; color:#e6edf3; }
    main pre { background:#161b22; }
    main th, main td { border-color:#30363d; }
    .topbar { border-color:#30363d; }
  }
</style>

function b64(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

async function deriveKey(pw){
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64(PAYLOAD.salt), iterations:PAYLOAD.iter, hash:'SHA-256' },
    baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
}
async function decrypt(key, item){
  const buf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(item.iv) }, key, b64(item.ct));
  return buf;
}

let KEY=null;
const cache={};

async function unlock(){
  if(KEY) return;
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  err.textContent='';
  try{
    const key=await deriveKey(pw);
    // verify against first doc; throws on wrong password (GCM auth)
    await decrypt(key, PAYLOAD.docs[0]);
    KEY=key;
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    buildNav();
    showDoc(PAYLOAD.docs[0].id);
  }catch(e){
    err.textContent='Incorrect password.';
  }
}

function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML='';
  PAYLOAD.docs.forEach(d=>{
    const b=document.createElement('button');
    b.textContent=d.title; b.dataset.id=d.id;
    b.onclick=()=>showDoc(d.id);
    nav.appendChild(b);
  });
  (PAYLOAD.links||[]).forEach(l=>{
    const b=document.createElement('button');
    b.textContent=l.title+' ↗';
    b.title=l.url;
    b.onclick=()=>window.open(l.url,'_blank','noopener');
    nav.appendChild(b);
  });
  const sp=document.createElement('span'); sp.className='spacer'; nav.appendChild(sp);
  (PAYLOAD.files||[]).forEach(f=>{
    const b=document.createElement('button');
    b.textContent='⬇ '+f.name;
    b.onclick=()=>downloadFile(f);
    nav.appendChild(b);
  });
}

async function showDoc(id){
  const doc=PAYLOAD.docs.find(d=>d.id===id);
  if(!doc) return;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
  let md=cache[id];
  if(md===undefined){
    const buf=await decrypt(KEY, doc);
    md=new TextDecoder().decode(buf);
    cache[id]=md;
  }
  const el=document.getElementById('content');
  if(doc.type==='html'){
    // full-page interactive HTML doc: render in an iframe so its scripts/styles run sandboxed
    el.style.maxWidth='none'; el.style.padding='0';
    el.innerHTML='';
    const f=document.createElement('iframe');
    f.style.cssText='width:100%;height:calc(100vh - 58px);border:0;display:block;background:transparent';
    f.srcdoc=md;
    el.appendChild(f);
  } else {
    el.style.maxWidth=''; el.style.padding='';
    if(window.marked){ el.innerHTML=marked.parse(md); }
    else { const pre=document.createElement('pre'); pre.textContent=md; el.innerHTML=''; el.appendChild(pre); }
  }
  window.scrollTo(0,0);
}

// Landing/intro pages (rendered in an iframe) navigate by posting {goto:<id>} to the parent.
window.addEventListener('message', e=>{ if(e.data && e.data.goto) showDoc(e.data.goto); });

async function downloadFile(f){
  const buf=await decrypt(KEY, f);
  const blob=new Blob([buf], {type:'application/octet-stream'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=f.name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
}

document.getElementById('go').onclick=unlock;
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });
</script>
</body>
